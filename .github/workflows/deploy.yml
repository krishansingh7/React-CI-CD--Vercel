name: Deploy to Vercel

on:
  push:
    branches:
      - main                     # deploy on every push to main
  pull_request:
    branches:
      - main                     # run tests on every PR (no deploy)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'           # caches node_modules between runs (faster)

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Lint (optional but good practice)
      - name: Lint
        run: npm run lint

      # 5. Build the React app (outputs to /dist)
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}    # inject env vars safely

      # 6. Deploy to Vercel (only on push to main, not PRs)
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}